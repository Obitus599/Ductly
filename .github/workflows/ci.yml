name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
  SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
  STRIPE_SECRET_KEY: sk_test_dummy
  STRIPE_WEBHOOK_SECRET: whsec_test_dummy
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  # Required so middleware enters the auth-required branch (otherwise
  # it skips auth as a dev convenience — see src/middleware.ts).
  ADMIN_API_KEY: test-admin-key

jobs:
  lint-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit-integration:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - name: Upload coverage
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e
      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/

  build:
    name: Production Build
    needs: [lint-typecheck, unit-integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

  deploy:
    name: Deploy to Production
    needs: [lint-typecheck, unit-integration, e2e, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            export NVM_DIR=/var/www/vhosts/ductly.ae/.nvm
            . $NVM_DIR/nvm.sh
            cd httpdocs
            git fetch origin main
            git reset --hard origin/main
            npm ci
            npx next build
            # Reload the running app. The served process is managed by pm2
            # (confirmed 2026-06: env/code changes only took effect after a
            # pm2 restart; touching tmp/restart.txt alone was a no-op). We do
            # BOTH so whichever front is actually live gets picked up:
            #   1. pm2 restart — the confirmed reload path for the app process
            #   2. touch tmp/restart.txt — harmless belt-and-suspenders in case
            #      a Passenger front is still in play for any vhost.
            pm2 restart ductly --update-env || echo "pm2 restart failed (continuing)"
            mkdir -p tmp && touch tmp/restart.txt

      - name: Post-deploy health check
        # Polls the live site's /api/health endpoint until it returns 200
        # (or 503 with a well-formed body, which means the app booted but
        # a downstream is degraded — still a successful deploy). Fails
        # the workflow if the site never responds within ~60s, which
        # is the signal that the new build crashed at startup.
        run: |
          set -e
          URL="https://staging.ductly.ae/api/health"
          echo "Polling $URL for up to 60s..."
          for i in $(seq 1 12); do
            code=$(curl -sk -o /tmp/health.json -w "%{http_code}" --max-time 5 "$URL" || echo "000")
            if [ "$code" = "200" ] || [ "$code" = "503" ]; then
              echo "Got HTTP $code after $((i*5))s:"
              cat /tmp/health.json
              exit 0
            fi
            echo "Attempt $i: HTTP $code (retrying in 5s)"
            sleep 5
          done
          echo "Health check FAILED — site did not respond with 200 or 503 within 60s"
          exit 1
